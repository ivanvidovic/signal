<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Broadcasting Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="left-column">

  <div id="drawer-handle" onclick="toggleDrawer()" aria-label="Toggle controls">
    <svg id="drawer-arrow" xmlns="http://www.w3.org/2000/svg" width="40" height="8" viewBox="0 0 40 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="2,10 20,2 38,10"/>
    </svg>
  </div>

  <header>
    <div class="header-logo">
      <a href="./" aria-label="Signal Broadcasting Co. — Home">
        <img src="./images/Signal_Broadcasting_Co.svg" alt="Signal Broadcasting Co.">
      </a>
    </div>
  </header>

  <div id="sidebar">
    <div class="panel-section">
      <div class="panel-label">Coaster Stack</div>
      <div class="zone-list">

        <div class="zone-row stack-controls-row">
          <div class="stack-control-group">
            <span class="zone-material">Qty</span>
            <div class="qty-chips">
              <button class="qty-chip" data-qty="0" onclick="setQuantity(0)">OFF</button>
              <button class="qty-chip" data-qty="1" onclick="setQuantity(1)">1</button>
              <button class="qty-chip" data-qty="2" onclick="setQuantity(2)">2</button>
              <button class="qty-chip" data-qty="3" onclick="setQuantity(3)">3</button>
              <button class="qty-chip active" data-qty="4" onclick="setQuantity(4)">4</button>
            </div>
          </div>
          <div class="stack-control-group">
            <span class="zone-material">View</span>
            <button class="flip-toggle" id="flip-toggle" onclick="flipTopCoaster()" aria-label="Flip top coaster">
              <span class="flip-label side-a">SIDE A</span>
              <span class="flip-indicator"></span>
              <span class="flip-label side-b">SIDE B</span>
            </button>
          </div>
        </div>

        <div class="zone-row stack-controls-row" id="rpm-row">
          <div class="stack-control-group">
            <span class="zone-material">RPM</span>
            <div class="qty-chips">
              <button class="qty-chip rpm-chip active" data-rpm="0"   onclick="setSpin(0)">OFF</button>
              <button class="qty-chip rpm-chip"        data-rpm="33.333" onclick="setSpin(33.333)">33⅓</button>
              <button class="qty-chip rpm-chip"        data-rpm="45"  onclick="setSpin(45)">45</button>
              <button class="qty-chip rpm-chip"        data-rpm="78"  onclick="setSpin(78)">78</button>
            </div>
          </div>
          <div class="stack-control-group volume-row" id="volume-row">
            <span class="zone-material">Vol</span>
            <div class="volume-slider-wrap">
              <svg class="volume-icon" xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
            </div>
          </div>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Coaster_Body" style="background:#1A1A1A;">
            <input type="color" id="color-Coaster_Body" value="#1A1A1A" oninput="setColor('Coaster_Body',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Record</div>
          </div>
          <div class="zone-hex" id="hex-Coaster_Body">#1A1A1A</div>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Label_A" style="background:#D93636;">
            <input type="color" id="color-Label_A" value="#D93636" oninput="setColor('Label_A',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Side A</div>
          </div>
          <div class="zone-hex" id="hex-Label_A">#D93636</div>
          <label class="label-upload-btn" id="upload-btn-Label_A" title="Upload image">
            <input type="file" accept="image/*" style="display:none" onchange="handleLabelUpload('A',this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </label>
          <button class="label-clear-btn" id="clear-btn-Label_A" title="Remove image" style="display:none" onclick="clearLabelTexture('A')">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Label_B" style="background:#0F6FD7;">
            <input type="color" id="color-Label_B" value="#0F6FD7" oninput="setColor('Label_B',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Side B</div>
          </div>
          <div class="zone-hex" id="hex-Label_B">#0F6FD7</div>
          <label class="label-upload-btn" id="upload-btn-Label_B" title="Upload image">
            <input type="file" accept="image/*" style="display:none" onchange="handleLabelUpload('B',this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </label>
          <button class="label-clear-btn" id="clear-btn-Label_B" title="Remove image" style="display:none" onclick="clearLabelTexture('B')">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Base Colors</div>
      <div class="zone-list">

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Yellow" style="background:#F5B82E;">
            <input type="color" id="color-Yellow" value="#C8C8C8" oninput="setColor('Yellow',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Main Body</div>
          </div>
          <div class="zone-hex" id="hex-Yellow">#C8C8C8</div>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Side_Panel" style="background:#0F6FD7;">
            <input type="color" id="color-Side_Panel" value="#0F6FD7" oninput="setColor('Side_Panel',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Side Panel</div>
          </div>
          <div class="zone-hex" id="hex-Side_Panel">#0F6FD7</div>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Pin_Mount" style="background:#1a1a1a;">
            <input type="color" id="color-Pin_Mount" value="#FE8616" oninput="setColor('Pin_Mount',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Pin Mount</div>
          </div>
          <div class="zone-hex" id="hex-Pin_Mount">#FE8616</div>
        </div>

        <div class="zone-row">
          <div class="zone-swatch" id="swatch-Feet" style="background:#1a1a1a;">
            <input type="color" id="color-Feet" value="#000000" oninput="setColor('Feet',this.value)">
          </div>
          <div class="zone-info">
            <div class="zone-name">Feet</div>
          </div>
          <div class="zone-hex" id="hex-Feet">#000000</div>
        </div>

      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Palettes</div>
      <div class="preset-grid">

        <button class="preset-btn active" onclick="applyPreset('signal')" id="preset-signal">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#F5B82E;"></div>
            <div class="preset-dot" style="background:#0F6FD7;"></div>
            <div class="preset-dot" style="background:#1a1a1a;"></div>
          </div>
          <span class="preset-name">Signal</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('bauhaus')" id="preset-bauhaus">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#F3E8CE;"></div>
            <div class="preset-dot" style="background:#C83737;"></div>
            <div class="preset-dot" style="background:#1A2535;"></div>
          </div>
          <span class="preset-name">Bauhaus</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('highvis')" id="preset-highvis">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#C8C8C8;"></div>
            <div class="preset-dot" style="background:#BBFF29;"></div>
            <div class="preset-dot" style="background:#FE8616;"></div>
          </div>
          <span class="preset-name">High-Vis</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('glacier')" id="preset-glacier">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#2B7FE0;"></div>
            <div class="preset-dot" style="background:#DDD5C8;"></div>
            <div class="preset-dot" style="background:#E8C84A;"></div>
          </div>
          <span class="preset-name">Glacier</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('cream')" id="preset-cream">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#f5e6c8;"></div>
            <div class="preset-dot" style="background:#8b4513;"></div>
            <div class="preset-dot" style="background:#2d1b0e;"></div>
          </div>
          <span class="preset-name">Cream</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('cascadia')" id="preset-cascadia">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#2D4A3E;"></div>
            <div class="preset-dot" style="background:#4A3728;"></div>
            <div class="preset-dot" style="background:#C8860A;"></div>
          </div>
          <span class="preset-name">Cascadia</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('tide')" id="preset-tide">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#C4C8CC;"></div>
            <div class="preset-dot" style="background:#E05050;"></div>
            <div class="preset-dot" style="background:#7AA08C;"></div>
          </div>
          <span class="preset-name">Tide</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('mesa')" id="preset-mesa">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#FF9A30;"></div>
            <div class="preset-dot" style="background:#8C96A0;"></div>
            <div class="preset-dot" style="background:#4A7C59;"></div>
          </div>
          <span class="preset-name">Mesa</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('slate')" id="preset-slate">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#B8B0A8;"></div>
            <div class="preset-dot" style="background:#E8E0D5;"></div>
            <div class="preset-dot" style="background:#3D4550;"></div>
          </div>
          <span class="preset-name">Slate</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('mango')" id="preset-mango">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#FF6B00;"></div>
            <div class="preset-dot" style="background:#00C896;"></div>
            <div class="preset-dot" style="background:#FFE000;"></div>
          </div>
          <span class="preset-name">Mango</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('crate')" id="preset-crate">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#6B1A2A;"></div>
            <div class="preset-dot" style="background:#C8860A;"></div>
            <div class="preset-dot" style="background:#F5E6C8;"></div>
          </div>
          <span class="preset-name">Crate</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('grid')" id="preset-grid">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#3A3530;"></div>
            <div class="preset-dot" style="background:#39FF14;"></div>
            <div class="preset-dot" style="background:#7B2FBE;"></div>
          </div>
          <span class="preset-name">Grid</span>
        </button>

        <button class="preset-btn" onclick="applyPreset('prism')" id="preset-prism">
          <div class="preset-dots">
            <div class="preset-dot" style="background:#4B0082;"></div>
            <div class="preset-dot" style="background:#FF6B35;"></div>
            <div class="preset-dot" style="background:#FFD700;"></div>
          </div>
          <span class="preset-name">Prism</span>
        </button>

        <button class="preset-btn preset-btn--randomize" onclick="randomizeColors()" id="preset-randomize">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          <span class="preset-name">Randomize</span>
        </button>

      </div>
    </div>

    <div class="panel-section" style="display: flex; flex-direction: column; gap: 8px;">
      <button class="reset-btn" onclick="resetDefaults()">↺ &nbsp;Reset to Default</button>
      <button class="reset-btn" onclick="shareConfig()">🔗 &nbsp;Share Config</button>
      <button class="reset-btn" id="themeBtn" aria-label="Toggle Dark Mode" onclick="toggleDarkMode()">☾ &nbsp;Dark Mode</button>
    </div>

  </div>

</div><!-- /#left-column -->

<div id="viewport">
  <div id="loading">
    <div id="load-progress">0%</div>
    <div class="loader-ring"></div>
    <div class="loader-label">Loading model</div>
  </div>
  <div id="canvas-container"></div>
  <div class="viewport-hint">
    <span>Drag to rotate</span>
    <span class="hint-sep">·</span>
    <span>Scroll to zoom</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>
</body>
</html>
